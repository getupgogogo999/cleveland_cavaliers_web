services:
  - type: web
    name: cavs-nation
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install --include=dev && npm run build
    startCommand: node server/index.js
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: VITE_SITE_URL
        value: https://cavs-nation-hclj.onrender.com
